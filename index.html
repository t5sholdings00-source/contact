<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>T5S · Connect</title>
  <link rel="icon" type="image/png" href="assets/llogo nb.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red:    #8B0000;
      --red-hi: #CC2020;
      --chrome: #C8C8D0;
      --white:  #F0EEEC;
      --dim:    #888880;
      --bg:     #050505;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    /* Noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 9999;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,0,0,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: 0.8rem;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }
    .logo-wrap img {
      width: clamp(80px, 18vw, 120px);
      height: auto;
      filter: drop-shadow(0 0 28px rgba(139,0,0,0.4));
    }

    /* ── HEADING ── */
    .brand {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      letter-spacing: 0.3em;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.45s forwards;
    }
    .brand-sub {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.48rem, 1.8vw, 0.6rem);
      letter-spacing: 0.45em;
      color: var(--red-hi);
      text-transform: uppercase;
      margin-top: 0.5rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }

    /* ── RULE ── */
    .rule {
      width: 100%;
      max-width: 360px;
      height: 0.5px;
      background: linear-gradient(to right, transparent, var(--red) 30%, var(--red) 70%, transparent);
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    /* ── SOCIAL LINKS ── */
    .links {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      padding: 1.1rem 1.6rem;
      border: 0.5px solid rgba(139,0,0,0.25);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      transition: border-color 0.35s, color 0.35s;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(139,0,0,0.05);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .social-link:hover { border-color: rgba(204,32,32,0.6); }
    .social-link:hover::before { transform: scaleX(1); }

    .social-link:nth-child(1) { animation-delay: 1.0s; }
    .social-link:nth-child(2) { animation-delay: 1.1s; }
    .social-link:nth-child(3) { animation-delay: 1.2s; }
    .social-link:nth-child(4) { animation-delay: 1.3s; }
    .social-link:nth-child(5) { animation-delay: 1.4s; }
    .social-link:nth-child(6) { animation-delay: 1.5s; }

    .link-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }
    .link-platform {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--chrome);
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .social-link:hover .link-platform { color: var(--white); }

    .link-handle {
      font-size: 0.82rem;
      font-style: italic;
      color: var(--dim);
      transition: color 0.3s;
    }
    .social-link:hover .link-handle { color: var(--chrome); }

    .link-arrow {
      position: relative;
      z-index: 1;
      font-size: 0.75rem;
      color: var(--red-hi);
      opacity: 0.6;
      transition: opacity 0.3s, transform 0.3s;
    }
    .social-link:hover .link-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Platform accent dot */
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-ig   { background: #C8C8D0; }
    .dot-x    { background: #C8C8D0; }
    .dot-li   { background: #C8C8D0; }
    .dot-tt   { background: #C8C8D0; }
    .dot-fb   { background: #C8C8D0; }
    .dot-yt   { background: #8B0000; }

    /* ── BOTTOM RULE ── */
    .rule-bottom {
      width: 100%;
      max-width: 400px;
      height: 0.5px;
      background: linear-gradient(to right, transparent, rgba(139,0,0,0.3) 50%, transparent);
      margin-top: 2.8rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.8s forwards;
    }

    /* ── BACK LINK ── */
    .back {
      margin-top: 2rem;
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.35em;
      color: var(--dim);
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 0.8s ease 2s forwards;
      transition: color 0.3s;
    }
    .back:hover { color: var(--chrome); }

    /* ── FOOTER NOTE ── */
    .foot-note {
      margin-top: 3.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.45rem;
      letter-spacing: 0.18em;
      color: rgba(136,136,128,0.35);
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.8s ease 2.1s forwards;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      .page { padding: 3rem 1.2rem; }
      .social-link { padding: 1rem 1.2rem; }
      .link-platform { font-size: 0.6rem; letter-spacing: 0.18em; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="logo-wrap">
      <img src="assets/llogo nb.png" alt="T5S"/>
    </div>

    <h1 class="brand">T5S</h1>
    <p class="brand-sub">Connect · Follow · Engage</p>

    <div class="rule"></div>

    <div class="links">

      <!-- Instagram -->
      <a class="social-link" href="https://instagram.com/wearet5s" target="_blank" rel="noopener">
        <div class="link-left">
          <span class="dot dot-ig"></span>
          <span class="link-platform">Instagram</span>
          <span class="link-handle">@wearet5s</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <!-- X / Twitter -->
      <a class="social-link" href="https://x.com/wearet5s" target="_blank" rel="noopener">
        <div class="link-left">
          <span class="dot dot-x"></span>
          <span class="link-platform">X</span>
          <span class="link-handle">@wearet5s</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <!-- TikTok -->
      <a class="social-link" href="https://tiktok.com/@wearet5s" target="_blank" rel="noopener">
        <div class="link-left">
          <span class="dot dot-tt"></span>
          <span class="link-platform">TikTok</span>
          <span class="link-handle">@wearet5s</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <!-- LinkedIn -->
      <a class="social-link" href="https://www.linkedin.com/feed/" target="_blank" rel="noopener">
        <div class="link-left">
          <span class="dot dot-li"></span>
          <span class="link-platform">LinkedIn</span>
          <span class="link-handle">Coming Soon</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <!-- Facebook -->
      <a class="social-link" href="https://facebook.com/wearet5s" target="_blank" rel="noopener">
        <div class="link-left">
          <span class="dot dot-fb"></span>
          <span class="link-platform">Facebook</span>
          <span class="link-handle">T5S</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

      <!-- YouTube -->
      <a class="social-link" href="https://youtube.com/@wearet5s" target="_blank" rel="noopener">
        <div class="link-left">
          <span class="dot dot-yt"></span>
          <span class="link-platform">YouTube</span>
          <span class="link-handle">@wearet5s</span>
        </div>
        <span class="link-arrow">→</span>
      </a>

    </div>

    <div class="rule-bottom"></div>

    <a class="back" href="https://wearet5s.com">← wearet5s.com</a>

    <p class="foot-note">&copy; 2026 T5S Holdings LLC · All Rights Reserved</p>

  </div>
</body>
</html>
